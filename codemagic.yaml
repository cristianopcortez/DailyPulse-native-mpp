workflows:
  kmp-workflow:
    name: KMP Build & Test Lab
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'feature/codemagic-pipeline'
          include: true
          source: true
    environment:
      groups:
        - FIREBASE_DAILYPULSE
      xcode: latest
      java: 17
    scripts:
      - name: Set up Service Account
        script: |
          if [ -z "$GCLOUD_SERVICE_ACCOUNT_CREDENTIALS" ]; then
            echo "Error: GCLOUD_SERVICE_ACCOUNT_CREDENTIALS is empty. Verify if the group name in YAML matches the Codemagic UI."
            exit 1
          fi
          # Using -D for macOS base64 compatibility
          echo "$GCLOUD_SERVICE_ACCOUNT_CREDENTIALS" | base64 -D > ./gcloud_key.json
      - name: Build Android (mpp debug + androidTest)
        script: |
          chmod +x gradlew
          # Debug APKs live under androidApp/build/outputs/apk/<flavor>/debug/ (see README).
          ./gradlew :androidApp:assembleMppDebug :androidApp:assembleMppDebugAndroidTest
      - name: iOS unit and integration tests (Simulator)
        script: |
          set -e
          chmod +x gradlew
          
          # 1. Simulate the full Xcode environment for KMP & Compose Resources
          export ARCHS="arm64"
          export SDK_NAME="iphonesimulator"
          export PLATFORM_NAME="iphonesimulator"
          export CONFIGURATION="Debug"
          
          # 2. Define output paths to resolve the 'outputDir' validation error
          # We use a temporary directory within the shared module build folder
          export BUILT_PRODUCTS_DIR="$(pwd)/shared/build/ios"
          export CONTENTS_FOLDER_PATH="."
          export TARGET_BUILD_DIR="$BUILT_PRODUCTS_DIR"
          export FRAMEWORKS_FOLDER_PATH="Frameworks"
          
          # 3. Ensure the output directory exists before running Gradle
          mkdir -p "$BUILT_PRODUCTS_DIR"
          
          # 3.5. Install xcparse to extract media from .xcresult later
          brew install chargepoint/xcparse/xcparse
          
          # 4. Build the shared framework with the injected context
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
          
          # 5. Execute both Unit and UI Tests on the simulator
          cd iosApp
          xcodebuild clean test \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO
      - name: Extract Media from XCUITest
        script: |
          # 5. Create a directory for media attachments
          mkdir -p iosApp/TestMedia
          
          # 6. Extract Screenshots and Videos
          # The 'screenshots' command automatically extracts all media attachments from the bundle
          xcparse screenshots iosApp/TestResults.xcresult iosApp/TestMedia
          
          # 7. DEBUG: List the extracted files (This will appear in your build logs)
          echo "--- Content of TestMedia folder ---"
          ls -R iosApp/TestMedia
          
          # 8. DEBUG: Verify if the .xcresult bundle exists
          echo "--- Checking if .xcresult bundle exists ---"
          ls -d iosApp/TestResults.xcresult

      - name: Run Tests on Firebase Test Lab (Android)
        script: |
          gcloud auth activate-service-account --key-file=./gcloud_key.json
          gcloud --quiet config set project dailypulse-kmp
          gcloud firebase test android run \
            --type instrumentation \
            --app androidApp/build/outputs/apk/mpp/debug/androidApp-mpp-debug.apk \
            --test androidApp/build/outputs/apk/androidTest/mpp/debug/androidApp-mpp-debug-androidTest.apk \
            --device model=MediumPhone.arm,version=34,locale=en,orientation=portrait

    artifacts:
      - iosApp/TestMedia/**/*        # Allows viewing images/videos directly in the Codemagic UI
      - iosApp/TestResults.xcresult  # Optional: keep the full bundle for deep debugging
      - androidApp/build/outputs/apk/**/*.apk
